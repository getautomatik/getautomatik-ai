<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GetAutomatik — Lead & Appuntamenti</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        :root {
            --bg: #06091a; --surface: #0e1330; --surface2: #121738;
            --border: rgba(255,255,255,0.07); --border2: rgba(255,255,255,0.12);
            --green: #00c28c; --blue: #3b82f6; --orange: #f59e0b;
            --text: #f0f4ff; --muted: rgba(240,244,255,0.45);
        }
        html { -webkit-font-smoothing: antialiased; }
        body { font-family:'Inter',sans-serif; background:var(--bg); color:var(--text); min-height:100vh; }

        /* NAV */
        nav { display:flex; align-items:center; gap:16px; padding:0 28px; height:56px; border-bottom:1px solid var(--border); position:sticky; top:0; background:rgba(6,9,26,0.95); backdrop-filter:blur(12px); z-index:100; }
        .nav-logo { font-weight:900; font-size:16px; letter-spacing:-0.4px; margin-right:auto; }
        .nav-logo span { color:var(--green); }
        .nav-badge { background:rgba(0,194,140,0.12); border:1px solid rgba(0,194,140,0.3); color:var(--green); border-radius:20px; padding:3px 10px; font-size:11px; font-weight:700; display:flex; align-items:center; gap:5px; }
        .nav-badge::before { content:''; width:6px; height:6px; border-radius:50%; background:var(--green); animation:blink 2s infinite; }
        @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.3} }

        /* TABS */
        .tabs { display:flex; gap:0; border-bottom:1px solid var(--border); padding:0 28px; }
        .tab { padding:14px 20px; font-size:13px; font-weight:700; color:var(--muted); cursor:pointer; border-bottom:2px solid transparent; transition:.2s; letter-spacing:0.2px; }
        .tab.active { color:var(--text); border-bottom-color:var(--green); }
        .tab:hover:not(.active) { color:var(--text); }
        .tab-badge { display:inline-flex; align-items:center; justify-content:center; min-width:18px; height:18px; background:var(--green); color:#06091a; border-radius:9px; font-size:10px; font-weight:800; margin-left:6px; padding:0 5px; }

        /* MAIN */
        .main { padding:28px; max-width:1100px; margin:0 auto; }

        /* STATS BAR */
        .stats-bar { display:grid; grid-template-columns:repeat(4,1fr); gap:12px; margin-bottom:24px; }
        .stat-card { background:var(--surface); border:1px solid var(--border); border-radius:14px; padding:16px 18px; }
        .stat-label { font-size:11px; font-weight:700; color:var(--muted); text-transform:uppercase; letter-spacing:0.6px; margin-bottom:6px; }
        .stat-val { font-size:26px; font-weight:900; letter-spacing:-1px; }
        .stat-val.green { color:var(--green); }
        .stat-val.blue { color:var(--blue); }
        .stat-val.orange { color:var(--orange); }

        /* CALENDAR STRIP */
        .cal-section { background:var(--surface); border:1px solid var(--border); border-radius:16px; margin-bottom:24px; overflow:hidden; }
        .cal-header { display:flex; align-items:center; justify-content:space-between; padding:16px 20px; border-bottom:1px solid var(--border); }
        .cal-title { font-size:14px; font-weight:700; }
        .cal-nav { display:flex; gap:6px; }
        .cal-nav button { background:rgba(255,255,255,0.05); border:1px solid var(--border); border-radius:7px; padding:5px 10px; font-size:12px; color:var(--text); cursor:pointer; }
        .cal-nav button:hover { border-color:rgba(0,194,140,0.3); }
        .cal-week { display:grid; grid-template-columns:repeat(7,1fr); gap:0; }
        .cal-day { padding:12px 8px; min-height:80px; border-right:1px solid var(--border); }
        .cal-day:last-child { border-right:none; }
        .cal-day-name { font-size:10px; font-weight:700; color:var(--muted); text-transform:uppercase; letter-spacing:0.5px; margin-bottom:4px; }
        .cal-day-num { font-size:16px; font-weight:800; margin-bottom:8px; }
        .cal-day.today .cal-day-num { color:var(--green); }
        .cal-apt { background:rgba(0,194,140,0.1); border:1px solid rgba(0,194,140,0.25); border-radius:6px; padding:4px 7px; font-size:11px; font-weight:600; margin-bottom:3px; cursor:pointer; transition:.15s; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
        .cal-apt:hover { background:rgba(0,194,140,0.18); }
        .cal-apt.pending { background:rgba(245,158,11,0.1); border-color:rgba(245,158,11,0.25); color:var(--orange); }

        /* LEADS GRID */
        .section-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:14px; }
        .section-title { font-size:13px; font-weight:800; text-transform:uppercase; letter-spacing:0.8px; color:var(--muted); }
        .filter-row { display:flex; gap:8px; }
        .filter-chip { padding:5px 12px; border-radius:20px; border:1px solid var(--border); font-size:12px; font-weight:600; color:var(--muted); cursor:pointer; transition:.15s; background:none; }
        .filter-chip.active, .filter-chip:hover { border-color:rgba(0,194,140,0.35); color:var(--text); background:rgba(0,194,140,0.06); }

        .leads-grid { display:grid; grid-template-columns:repeat(auto-fill, minmax(310px, 1fr)); gap:14px; }
        .lead-card { background:var(--surface); border:1px solid var(--border); border-radius:16px; padding:20px; transition:border-color .2s, transform .15s; }
        .lead-card:hover { border-color:rgba(0,194,140,0.25); transform:translateY(-1px); }
        .lead-card.has-apt { border-left:3px solid var(--green); }
        .lead-card.hot { border-left:3px solid var(--orange); }
        .lc-top { display:flex; align-items:flex-start; justify-content:space-between; margin-bottom:14px; }
        .lc-avatar { width:38px; height:38px; border-radius:10px; background:linear-gradient(135deg,rgba(0,194,140,0.2),rgba(59,130,246,0.2)); display:flex; align-items:center; justify-content:center; font-size:17px; flex-shrink:0; margin-right:12px; }
        .lc-name { font-size:15px; font-weight:800; letter-spacing:-0.3px; }
        .lc-time { font-size:11px; color:var(--muted); margin-top:2px; }
        .lc-badge { font-size:11px; font-weight:700; padding:3px 9px; border-radius:20px; white-space:nowrap; }
        .lc-badge.qualified { background:rgba(0,194,140,0.12); color:var(--green); border:1px solid rgba(0,194,140,0.2); }
        .lc-badge.apt { background:rgba(59,130,246,0.12); color:#93c5fd; border:1px solid rgba(59,130,246,0.2); }
        .lc-badge.pending { background:rgba(245,158,11,0.1); color:var(--orange); border:1px solid rgba(245,158,11,0.2); }
        .lc-details { display:flex; flex-direction:column; gap:6px; margin-bottom:14px; }
        .lc-row { display:flex; gap:8px; align-items:flex-start; }
        .lc-icon { font-size:13px; flex-shrink:0; margin-top:1px; opacity:.7; }
        .lc-text { font-size:13px; color:var(--muted); }
        .lc-text strong { color:var(--text); font-weight:600; }
        .lc-apt-box { background:rgba(59,130,246,0.07); border:1px solid rgba(59,130,246,0.18); border-radius:10px; padding:10px 12px; margin-bottom:14px; display:flex; align-items:center; gap:8px; }
        .lc-apt-box .apt-icon { font-size:16px; }
        .lc-apt-label { font-size:11px; color:#93c5fd; font-weight:700; text-transform:uppercase; letter-spacing:0.5px; }
        .lc-apt-val { font-size:13px; font-weight:700; color:var(--text); }
        .lc-actions { display:flex; gap:8px; }
        .btn-action { flex:1; padding:9px 0; border-radius:9px; font-size:12px; font-weight:700; cursor:pointer; border:none; font-family:inherit; transition:.15s; }
        .btn-call { background:rgba(0,194,140,0.12); color:var(--green); border:1px solid rgba(0,194,140,0.2); }
        .btn-call:hover { background:rgba(0,194,140,0.2); }
        .btn-confirm { background:rgba(59,130,246,0.12); color:#93c5fd; border:1px solid rgba(59,130,246,0.2); }
        .btn-confirm:hover { background:rgba(59,130,246,0.2); }
        .btn-note { background:rgba(255,255,255,0.04); color:var(--muted); border:1px solid var(--border); }
        .btn-note:hover { color:var(--text); border-color:var(--border2); }

        /* EMPTY STATE */
        .empty-state { text-align:center; padding:60px 20px; color:var(--muted); }
        .empty-icon { font-size:40px; margin-bottom:14px; opacity:.5; }
        .empty-title { font-size:16px; font-weight:700; margin-bottom:8px; color:var(--text); opacity:.5; }
        .empty-sub { font-size:13px; }

        /* TABS CONTENT */
        .tab-content { display:none; }
        .tab-content.active { display:block; }

        /* LOADING */
        .spinner { width:16px; height:16px; border:2px solid rgba(0,194,140,0.3); border-top-color:var(--green); border-radius:50%; animation:spin .7s linear infinite; display:inline-block; }
        @keyframes spin { to{transform:rotate(360deg)} }

        /* MODAL */
        .modal-overlay { position:fixed; inset:0; background:rgba(0,0,0,0.7); z-index:200; display:none; align-items:center; justify-content:center; padding:20px; }
        .modal-overlay.open { display:flex; }
        .modal { background:var(--surface); border:1px solid var(--border2); border-radius:20px; padding:28px; max-width:420px; width:100%; position:relative; }
        .modal-close { position:absolute; top:14px; right:14px; background:rgba(255,255,255,0.06); border:none; color:var(--muted); border-radius:6px; width:28px; height:28px; cursor:pointer; font-size:16px; }
        .modal h3 { font-size:18px; font-weight:800; margin-bottom:16px; }
        .modal-detail { display:flex; gap:10px; align-items:flex-start; padding:10px 0; border-bottom:1px solid var(--border); }
        .modal-detail:last-of-type { border-bottom:none; }
        .modal-detail .mi { font-size:16px; flex-shrink:0; margin-top:1px; }
        .modal-detail .mk { font-size:11px; color:var(--muted); font-weight:700; text-transform:uppercase; }
        .modal-detail .mv { font-size:14px; font-weight:600; margin-top:2px; }

        @media(max-width:700px) {
            .stats-bar { grid-template-columns:repeat(2,1fr); }
            .cal-week { grid-template-columns:repeat(7,1fr); font-size:10px; }
            .main { padding:16px; }
        }
    </style>
</head>
<body>

<nav>
    <div class="nav-logo">Get<span>Automatik</span></div>
    <div class="nav-badge">Assistente attivo</div>
    <a href="/" style="font-size:12px;color:var(--muted);text-decoration:none;">← Sito</a>
</nav>

<div class="tabs">
    <div class="tab active" onclick="switchTab('leads')">Lead qualificati <span class="tab-badge" id="badge-leads">0</span></div>
    <div class="tab" onclick="switchTab('calendar')">Calendario visite <span class="tab-badge" id="badge-apts">0</span></div>
</div>

<div class="main">

    <!-- STATS BAR -->
    <div class="stats-bar">
        <div class="stat-card">
            <div class="stat-label">Lead totali</div>
            <div class="stat-val green" id="stat-total">—</div>
        </div>
        <div class="stat-card">
            <div class="stat-label">Con appuntamento</div>
            <div class="stat-val blue" id="stat-apts">—</div>
        </div>
        <div class="stat-card">
            <div class="stat-label">Questa settimana</div>
            <div class="stat-val" id="stat-week">—</div>
        </div>
        <div class="stat-card">
            <div class="stat-label">Risposta media AI</div>
            <div class="stat-val orange">~2 min</div>
        </div>
    </div>

    <!-- TAB: LEADS -->
    <div class="tab-content active" id="tab-leads">
        <div class="section-header">
            <span class="section-title">Lead qualificati</span>
            <div class="filter-row">
                <button class="filter-chip active" onclick="filterLeads('all', this)">Tutti</button>
                <button class="filter-chip" onclick="filterLeads('apt', this)">Con visita</button>
                <button class="filter-chip" onclick="filterLeads('nonapt', this)">Da contattare</button>
            </div>
        </div>
        <div class="leads-grid" id="leads-grid">
            <div style="grid-column:1/-1;text-align:center;padding:40px;color:var(--muted);">
                <span class="spinner"></span> Caricamento lead...
            </div>
        </div>
    </div>

    <!-- TAB: CALENDAR -->
    <div class="tab-content" id="tab-calendar">
        <div class="cal-section">
            <div class="cal-header">
                <div class="cal-title" id="cal-month-label">Luglio 2026</div>
                <div class="cal-nav">
                    <button onclick="calPrev()">&#8592;</button>
                    <button onclick="calToday()">Oggi</button>
                    <button onclick="calNext()">&#8594;</button>
                </div>
            </div>
            <div class="cal-week" id="cal-week"></div>
        </div>

        <div class="section-header" style="margin-top:20px;">
            <span class="section-title">Visite programmate</span>
        </div>
        <div class="leads-grid" id="apts-grid">
            <div style="grid-column:1/-1;text-align:center;padding:40px;color:var(--muted);">
                <span class="spinner"></span> Caricamento appuntamenti...
            </div>
        </div>
    </div>

</div>

<!-- MODAL -->
<div class="modal-overlay" id="modal" onclick="closeModal(event)">
    <div class="modal" id="modal-inner">
        <button class="modal-close" onclick="closeModal()">&#10005;</button>
        <h3 id="modal-name">—</h3>
        <div id="modal-body"></div>
        <div style="display:flex;gap:8px;margin-top:20px;" id="modal-actions"></div>
    </div>
</div>

<script>
let allLeads = [];
let allApts = [];
let currentFilter = 'all';
let calWeekOffset = 0;

// ---- Data Fetch ----
async function loadLeads() {
    try {
        const r = await fetch('/api/agent/leads', {credentials: 'same-origin'});
        if (r.status === 401) { window.location.href = '/agent/login'; return; }
        allLeads = await r.json();
        renderLeads();
        document.getElementById('stat-total').textContent = allLeads.length;
        document.getElementById('badge-leads').textContent = allLeads.length;
        const wk = weekStart();
        const weekLeads = allLeads.filter(l => l.created_at && l.created_at.slice(0,10) >= wk);
        document.getElementById('stat-week').textContent = weekLeads.length;
    } catch(e) {
        document.getElementById('leads-grid').innerHTML = '<div style="grid-column:1/-1;text-align:center;padding:40px;color:var(--muted);">Errore nel caricamento lead.</div>';
    }
}

async function loadApts() {
    try {
        const r = await fetch('/api/agent/appointments', {credentials: 'same-origin'});
        allApts = await r.json();
        document.getElementById('stat-apts').textContent = allApts.length;
        document.getElementById('badge-apts').textContent = allApts.length;
        renderApts();
        renderCalendar();
    } catch(e) {}
}

function weekStart() {
    const d = new Date();
    d.setDate(d.getDate() - d.getDay() + 1);
    return d.toISOString().slice(0,10);
}

// ---- RENDER LEADS ----
function renderLeads() {
    const grid = document.getElementById('leads-grid');
    let data = allLeads;
    if (currentFilter === 'apt') data = data.filter(l => l.lead_appointment);
    if (currentFilter === 'nonapt') data = data.filter(l => !l.lead_appointment);

    if (!data.length) {
        grid.innerHTML = `<div style="grid-column:1/-1"><div class="empty-state"><div class="empty-icon">💬</div><div class="empty-title">Nessun lead ancora</div><div class="empty-sub">Quando un visitatore completa la qualifica sul chatbot, appare qui.</div></div></div>`;
        return;
    }

    grid.innerHTML = data.map(l => leadCard(l)).join('');
}

function leadCard(l) {
    const hasApt = !!l.lead_appointment;
    const name = l.lead_name || 'Lead senza nome';
    const initials = name.split(' ').map(w => w[0]).slice(0,2).join('').toUpperCase();
    const relTime = relativeTime(l.created_at);

    let badgeHtml = hasApt
        ? `<span class="lc-badge apt">&#128197; Visita prenotata</span>`
        : `<span class="lc-badge qualified">&#10003; Qualificato</span>`;

    let aptHtml = '';
    if (hasApt) {
        aptHtml = `<div class="lc-apt-box"><span class="apt-icon">&#128197;</span><div><div class="lc-apt-label">Appuntamento</div><div class="lc-apt-val">${l.lead_appointment}</div></div></div>`;
    }

    let details = '';
    if (l.lead_phone) details += `<div class="lc-row"><span class="lc-icon">📱</span><div class="lc-text"><strong>${l.lead_phone}</strong></div></div>`;
    if (l.lead_type) details += `<div class="lc-row"><span class="lc-icon">🏠</span><div class="lc-text">${l.lead_type}</div></div>`;
    if (l.lead_zone) details += `<div class="lc-row"><span class="lc-icon">📍</span><div class="lc-text">${l.lead_zone}</div></div>`;
    if (l.lead_budget) details += `<div class="lc-row"><span class="lc-icon">💰</span><div class="lc-text">${l.lead_budget}</div></div>`;

    const cardClass = `lead-card${hasApt ? ' has-apt' : ''}`;
    return `<div class="${cardClass}" onclick="openModal(${JSON.stringify(l).replace(/"/g, '&quot;')})">
        <div class="lc-top">
            <div style="display:flex;align-items:center;">
                <div class="lc-avatar">${initials || '👤'}</div>
                <div><div class="lc-name">${name}</div><div class="lc-time">${relTime}</div></div>
            </div>
            ${badgeHtml}
        </div>
        <div class="lc-details">${details || '<div class="lc-text">Dati in corso di raccolta</div>'}</div>
        ${aptHtml}
        <div class="lc-actions">
            ${l.lead_phone ? `<button class="btn-action btn-call" onclick="event.stopPropagation();callLead('${l.lead_phone}')">📞 Chiama</button>` : ''}
            ${hasApt ? `<button class="btn-action btn-confirm" onclick="event.stopPropagation();confirmApt(this, '${l.id}')">✓ Conferma</button>` : ''}
            <button class="btn-action btn-note" onclick="event.stopPropagation()">📝 Note</button>
        </div>
    </div>`;
}

// ---- RENDER APTS ----
function renderApts() {
    const grid = document.getElementById('apts-grid');
    if (!allApts.length) {
        grid.innerHTML = `<div style="grid-column:1/-1"><div class="empty-state"><div class="empty-icon">📅</div><div class="empty-title">Nessuna visita programmata</div><div class="empty-sub">Le visite prenotate dal chatbot appariranno qui.</div></div></div>`;
        return;
    }
    grid.innerHTML = allApts.map(l => leadCard(l)).join('');
}

// ---- CALENDAR ----
function renderCalendar() {
    const today = new Date();
    const start = new Date(today);
    start.setDate(today.getDate() - today.getDay() + 1 + calWeekOffset * 7);

    const days = ['Lun','Mar','Mer','Gio','Ven','Sab','Dom'];
    const monthNames = ['Gennaio','Febbraio','Marzo','Aprile','Maggio','Giugno','Luglio','Agosto','Settembre','Ottobre','Novembre','Dicembre'];
    document.getElementById('cal-month-label').textContent = monthNames[start.getMonth()] + ' ' + start.getFullYear();

    const week = document.getElementById('cal-week');
    week.innerHTML = '';

    for (let i = 0; i < 7; i++) {
        const d = new Date(start);
        d.setDate(start.getDate() + i);
        const iso = d.toISOString().slice(0,10);
        const isToday = iso === today.toISOString().slice(0,10);

        const dayApts = allApts.filter(l => {
            const apt = (l.lead_appointment || '').toLowerCase();
            return apt.includes(days[i].toLowerCase()) || apt.includes(iso);
        });

        const aptChips = dayApts.map(l =>
            `<div class="cal-apt" onclick="openModal(${JSON.stringify(l).replace(/"/g, '&quot;')})">${l.lead_name || 'Lead'}</div>`
        ).join('');

        week.innerHTML += `<div class="cal-day${isToday ? ' today' : ''}">
            <div class="cal-day-name">${days[i]}</div>
            <div class="cal-day-num">${d.getDate()}</div>
            ${aptChips}
        </div>`;
    }
}

function calPrev() { calWeekOffset--; renderCalendar(); }
function calNext() { calWeekOffset++; renderCalendar(); }
function calToday() { calWeekOffset = 0; renderCalendar(); }

// ---- TABS ----
function switchTab(tab) {
    document.querySelectorAll('.tab').forEach((t,i) => t.classList.remove('active'));
    document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
    const tabs = ['leads','calendar'];
    document.querySelectorAll('.tab')[tabs.indexOf(tab)].classList.add('active');
    document.getElementById('tab-' + tab).classList.add('active');
}

// ---- FILTER ----
function filterLeads(filter, btn) {
    currentFilter = filter;
    document.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active'));
    btn.classList.add('active');
    renderLeads();
}

// ---- MODAL ----
function openModal(lead) {
    if (typeof lead === 'string') lead = JSON.parse(lead.replace(/&quot;/g, '"'));
    document.getElementById('modal-name').textContent = lead.lead_name || 'Lead';

    const rows = [
        lead.lead_phone && ['📱', 'Telefono', lead.lead_phone],
        lead.lead_type && ['🏠', 'Interesse', lead.lead_type],
        lead.lead_zone && ['📍', 'Zona', lead.lead_zone],
        lead.lead_budget && ['💰', 'Budget', lead.lead_budget],
        lead.lead_appointment && ['📅', 'Appuntamento', lead.lead_appointment],
        lead.created_at && ['🕐', 'Ricevuto', new Date(lead.created_at).toLocaleString('it-IT')],
    ].filter(Boolean);

    document.getElementById('modal-body').innerHTML = rows.map(([icon, key, val]) =>
        `<div class="modal-detail"><span class="mi">${icon}</span><div><div class="mk">${key}</div><div class="mv">${val}</div></div></div>`
    ).join('');

    document.getElementById('modal-actions').innerHTML = [
        lead.lead_phone ? `<button class="btn-action btn-call" style="flex:1" onclick="callLead('${lead.lead_phone}')">📞 Chiama ora</button>` : '',
        `<button class="btn-action btn-note" style="flex:1" onclick="closeModal()">Chiudi</button>`
    ].join('');

    document.getElementById('modal').classList.add('open');
}

function closeModal(e) {
    if (!e || e.target === document.getElementById('modal')) {
        document.getElementById('modal').classList.remove('open');
    }
}

function callLead(phone) {
    window.open('tel:' + phone);
}

function confirmApt(btn, id) {
    btn.textContent = '✓ Confermata';
    btn.style.opacity = '.5';
    btn.disabled = true;
}

// ---- UTILS ----
function relativeTime(iso) {
    if (!iso) return '';
    const diff = (Date.now() - new Date(iso)) / 1000;
    if (diff < 60) return 'Adesso';
    if (diff < 3600) return `${Math.floor(diff/60)} min fa`;
    if (diff < 86400) return `${Math.floor(diff/3600)} ore fa`;
    return new Date(iso).toLocaleDateString('it-IT', {day:'2-digit',month:'short'});
}
